services:

  backend:
    build: ./backend
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    ports:
      - "5174:5174"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - /app/.vite
    depends_on:
      - backend

volumes:
  frontend_node_modules: